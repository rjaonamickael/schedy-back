# ══════════════════════════════════════════════════════════════
# SCHEDY TEST — Test-scoped configuration (H2 in-memory)
# ──────────────────────────────────────────────────────────────
# Loaded automatically by Spring Boot when any @SpringBootTest
# runs. Unit tests using @ExtendWith(MockitoExtension.class) do
# not load the Spring context, so this file has no effect on
# them — they continue to run in pure Mockito isolation.
# ══════════════════════════════════════════════════════════════

# ── Profil : "test" — evite l'activation des blocs "dev"/"prod" du main application.yml ──
spring.profiles.active=test

# ── Datasource : H2 in-memory en mode PostgreSQL compat ──
spring.datasource.url=jdbc:h2:mem:schedy_test;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;CASE_INSENSITIVE_IDENTIFIERS=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# ── JPA : Hibernate auto-schema, pas de validation stricte ──
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# ── Flyway desactive : H2 schema genere par Hibernate, pas par les migrations Postgres ──
spring.flyway.enabled=false

# ── Mail : dummy values (les mocks Mockito couvrent les tests reels) ──
spring.mail.host=localhost
spring.mail.port=25
spring.mail.username=test
spring.mail.password=test
spring.mail.from=test@schedy.local
brevo.api-key=

# ── JWT : secret de test (256 bits min) ──
jwt.secret=test-secret-key-for-junit-tests-only-must-be-long-enough-for-hs256-algo-32chars-plus
jwt.access-token-expiration=1800000
jwt.refresh-token-expiration=604800000

# ── TOTP : cle AES-256-GCM de test (32 octets base64) — non-dev key, ignored by TotpEncryptionUtil fail-fast ──
schedy.totp.encryption-key=7N0zrjgp/lyXNo+F3mS00cHxIkVm0f4ZXzcmaYWBpgA=

# ── Kiosk admin code : test value ──
schedy.kiosk.admin-code=2580

# ── Schedy misc config ──
schedy.frontend-url=http://localhost:4200
schedy.mail.contact=contact@schedy.local
schedy.invitation.expiry-hours=24
schedy.email-2fa.code-expiry-seconds=300
schedy.email-2fa.modal-duration-seconds=300

# ── Async pool : petit pour tests ──
spring.task.execution.pool.core-size=1
spring.task.execution.pool.max-size=2
spring.task.execution.pool.queue-capacity=10

# ── CORS : test origin ──
cors.allowed-origins=http://localhost:4200

# ── Management : endpoints limites pour tests ──
management.endpoints.web.exposure.include=health
management.server.port=-1
